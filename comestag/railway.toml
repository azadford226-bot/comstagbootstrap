# Railway configuration file
# This helps Railway detect and configure your Spring Boot application
# NOTE: Root Directory must be set to "comestag" in Railway Settings for this to work

[build]
  builder = "NIXPACKS"

[deploy]
  startCommand = "java -jar target/comestag-0.0.1-SNAPSHOT.jar"
  healthcheckPath = "/actuator/health"
  healthcheckTimeout = 100
  restartPolicyType = "ON_FAILURE"
  restartPolicyMaxRetries = 10

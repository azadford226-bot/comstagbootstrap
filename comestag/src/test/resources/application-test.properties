# Test environment configuration
spring.application.name=comestag-test

# Use H2 in-memory database for tests
spring.datasource.url=jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# Disable Flyway for tests (using ddl-auto=create-drop instead)
spring.flyway.enabled=false

# Test JWT configuration
auth.token.user.secret_key=dGVzdC1zZWNyZXQta2V5LWZvci11bml0LXRlc3RzLW9ubHktMTIzNDU2Nzg5MA==
auth.token.access.duration=1800
auth.token.refresh.duration=18000
verification_code.secret=test-verification-secret
verification_code.algo=HmacSHA256

# Email configuration (mock)
spring.mail.host=localhost
spring.mail.port=25
spring.mail.username=test@test.com
spring.mail.password=testpass
mail.from=test@comestag.com
mail.fromName=Comestag Test

# Disable SendGrid for tests
sendgrid.apiKey=test-key

# Test URLs
url.base=http://localhost:8080
url.verification-code.verify=${url.base}/v1/auth/email-verify
url.email.restore=${url.base}/v1/auth/restore-email
url.org.my-profile=${url.base}/v1/profile

# CORS - allow all for tests
app.cors.allowed-origins=*
app.cors.allowed-methods=GET,POST,PUT,DELETE,PATCH,OPTIONS
app.cors.allowed-headers=*
app.cors.allow-credentials=true

# Disable rate limiting for tests
app.rate-limit.enabled=false

# Logging
logging.level.root=ERROR
logging.level.com.hivecontrolsolutions.comestag=DEBUG
logging.level.org.springframework.test=INFO

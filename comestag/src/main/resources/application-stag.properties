url.base=https://comstag.vercel.app
url.verification-code.verify=${url.base}/verify-email
url.email.restore=${url.base}/restore-email
url.org.my-profile=${url.base}/profile


app.media.max-attachments-per-post=10
# 100 MB
app.media.max-file-bytes=104857600
app.media.allowed-kinds=[IMAGE, VIDEO, DOC]
#============= JSON ===========
spring.jackson.default-property-inclusion=non_null
spring.jackson.serialization.WRITE_DATES_AS_TIMESTAMPS=false
# All secrets must be provided via environment variables
# DO NOT hardcode secrets in this file
verification_code.secret=${VERIFICATION_CODE_SECRET}
verification_code.algo=HmacSHA256
# one day
auth.token.refresh.duration=${AUTH_TOKEN_REFRESH_DURATION:864000}
# 15 minutes
auth.token.access.duration=${AUTH_TOKEN_ACCESS_DURATION:36000}
auth.token.user.secret_key=${AUTH_TOKEN_USER_SECRET_KEY}
#=============== Email ================#
# Email configuration - use environment variables
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}

# SendGrid configuration - use environment variables
sendgrid.apiKey=${SENDGRID_API_KEY}
mail.from=${MAIL_FROM}
mail.fromName=${MAIL_FROM_NAME:Comestag}
#=============== Media ================#
media.dire.profile=profile
media.dire.success-story=success_story
media.dire.certificate=certificate
media.dire.post=post
media.dire.event=event
#=============== Supabase ================#
supabase.url=${SUPABASE_URL:https://msnkhkvbexvrxykizidz.supabase.co}
supabase.serviceKey=${SUPABASE_SERVICE_KEY}
supabase.storage.bucket=comestag-media
supabase.storage.public-base-url=${supabase.url}/storage/v1/object/public


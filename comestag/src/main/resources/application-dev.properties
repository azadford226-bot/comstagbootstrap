# Development environment configuration
# This file should only contain dev-specific overrides
# All secrets should be set via environment variables

url.base=${APP_BASE_URL:https://comstag-back.onrender.com}
url.verification-code.verify=${url.base}/v1/auth/email-verify
url.email.restore=${url.base}/v1/auth/restore-email
url.org.my-profile=${url.base}/v1/profile

# Database configuration - set via environment variables
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

spring.flyway.url=${SPRING_DATASOURCE_URL}
spring.flyway.user=${SPRING_DATASOURCE_USERNAME}
spring.flyway.password=${SPRING_DATASOURCE_PASSWORD}



app.media.max-attachments-per-post=10
# 100 MB
app.media.max-file-bytes=104857600
app.media.allowed-kinds=[IMAGE, VIDEO, DOC]

# All sensitive configuration (JWT secrets, email credentials, API keys)
# should be set via environment variables - see main application.properties

spring.application.name=comestag
#port - Railway sets PORT env var, Spring Boot will use it automatically
# Default to 3000 for local development, but Railway will override with PORT env var
server.port=${PORT:3000}
spring.threads.virtual.enabled=true

url.base=http://localhost:${server.port}
url.verification-code.verify=${url.base}/v1/auth/email-verify
url.email.restore=${url.base}/v1/auth/restore-email
url.org.my-profile=${url.base}/v1/profile



spring.profiles.active=${SPRING_PROFILES_ACTIVE:prod}
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/comestag}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:comestag}
spring.datasource.password=${DB_PASSWORD:comestag}
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.open-in-view=false
spring.flyway.enabled=true
spring.flyway.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/comestag}
spring.flyway.user=${SPRING_DATASOURCE_USERNAME:comestag}
spring.flyway.password=${DB_PASSWORD:comestag}
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
app.security.jwt-secret=${APP_SECURITY_JWT_SECRET:}
app.security.jwt-exp-minutes=60

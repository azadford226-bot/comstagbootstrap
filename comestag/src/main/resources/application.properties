app.media.max-file-bytes=104857600
app.media.allowed-kinds=[IMAGE, VIDEO, DOC]
#============= Logging ===========
logging.level.root=INFO
logging.level.com.acme.sensors=INFO
logging.level.org.springframework.web=INFO
logging.level.org.springframework.http.server.reactive=INFO
logging.level.reactor.netty=INFO
# Reactor Netty access log (per HTTP request line)
reactor.netty.http.server.accessLogEnabled=true
management.tracing.enabled=true
spring.reactor.context-propagation=auto
management.tracing.sampling.probability=1.0
# Safe default actuator exposure (debug endpoints should be profile-specific)
management.endpoints.web.exposure.include=health,info,prometheus,metrics
# comment out if you don?t have an OTLP collector running
#otel.exporter.otlp.endpoint=http://localhost:4317
#otel.exporter.otlp.protocol=grpc
## or HTTP: http://localhost:4318 and protocol=http/protobuf
#============= JSON ===========
spring.jackson.default-property-inclusion=non_null
spring.jackson.serialization.WRITE_DATES_AS_TIMESTAMPS=false
verification_code.secret=${VERIFICATION_CODE_SECRET:}
verification_code.algo=HmacSHA256
auth.token.refresh.duration=${AUTH_TOKEN_REFRESH_DURATION:18000}
auth.token.access.duration=${AUTH_TOKEN_ACCESS_DURATION:1800}
auth.token.user.secret_key=${AUTH_TOKEN_USER_SECRET_KEY}
#=============== Email ================#
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
#============== Account Configs ===============#
account.email.change-log.expiry=604800

#============== CORS Configuration ===============#
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:}
app.cors.allowed-methods=${CORS_ALLOWED_METHODS:GET,POST,PUT,DELETE,PATCH,OPTIONS}
app.cors.allowed-headers=${CORS_ALLOWED_HEADERS:*}
app.cors.allow-credentials=${CORS_ALLOW_CREDENTIALS:true}
app.cors.max-age=${CORS_MAX_AGE:3600}

#============== Rate Limiting Configuration ===============#
app.rate-limit.enabled=${RATE_LIMIT_ENABLED:true}
app.rate-limit.login.capacity=${RATE_LIMIT_LOGIN_CAPACITY:5}
app.rate-limit.login.refill-tokens=${RATE_LIMIT_LOGIN_REFILL_TOKENS:5}
app.rate-limit.login.refill-duration-minutes=${RATE_LIMIT_LOGIN_REFILL_DURATION:15}
app.rate-limit.register.capacity=${RATE_LIMIT_REGISTER_CAPACITY:3}
app.rate-limit.register.refill-tokens=${RATE_LIMIT_REGISTER_REFILL_TOKENS:3}
app.rate-limit.register.refill-duration-minutes=${RATE_LIMIT_REGISTER_REFILL_DURATION:60}
app.rate-limit.api.capacity=${RATE_LIMIT_API_CAPACITY:100}
app.rate-limit.api.refill-tokens=${RATE_LIMIT_API_REFILL_TOKENS:100}
app.rate-limit.api.refill-duration-minutes=${RATE_LIMIT_API_REFILL_DURATION:1}

#============== SendGrid ===============#
sendgrid.apiKey=${SENDGRID_API_KEY}
mail.from=${MAIL_FROM}
mail.fromName=${MAIL_FROM_NAME:Comestag}
